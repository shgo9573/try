name: Build Windows EXE

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4  # שודרג ל-v4
    
    - name: Set up Python
      uses: actions/setup-python@v5 # שודרג ל-v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        pip install llama-cpp-python pyinstaller
        
    - name: Build EXE
      run: |
        pyinstaller --onefile --noconsole --name GemmaChat chat_app.py
        
    - name: Upload EXE
      uses: actions/upload-artifact@v4 # התיקון הקריטי: שודרג ל-v4
      with:
        name: GemmaChat-Windows
        path: dist/GemmaChat.exe
